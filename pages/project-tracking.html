<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milestone Tracking - Vision to Reality</title>
    <link rel="stylesheet" href="../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .milestone-list {
            display: flex;
            flex-direction: column;
            gap: 24px;
            margin-top: 40px;
        }
        .milestone-item {
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.05);
            display: grid;
            grid-template-columns: 80px 1fr 150px;
            align-items: center;
            gap: 24px;
        }
        .milestone-status-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .status-completed { background: rgba(50, 215, 75, 0.1); color: var(--accent-success); }
        .status-in-progress { background: rgba(10, 132, 255, 0.1); color: var(--accent-blue); }
        .status-pending { background: rgba(134, 134, 139, 0.1); color: var(--text-muted); }
        
        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 24px;
        }
        .team-member {
            background: var(--bg-tertiary);
            padding: 16px;
            border-radius: var(--radius-sm);
            text-align: center;
        }
        .member-role {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="bg-visuals">
        <div class="wave"></div>
    </div>

    <nav class="navbar">
        <div class="container nav-content">
            <div class="logo">
                <a href="../index.html" style="color: inherit; display: flex; align-items: center; gap: 8px;">
                    <span style="font-weight: 300;">Vision to Reality</span>
                </a>
            </div>
            <div id="navLinks" class="nav-links">
                <a href="../index.html">Discover</a>
                <a href="crowdfunding.html">Crowdfunding</a>
                <a href="dashboard.html" class="btn btn-primary" style="padding: 6px 16px;">Dashboard</a>
            </div>
        </div>
    </nav>

    <main class="container" style="margin-top: 60px; margin-bottom: 100px;">
        <header class="animate-fade-in">
            <h1 id="projectTitle" style="font-size: 3rem; margin-bottom: 12px;">Loading Project...</h1>
            <p id="projectStatus" class="text-muted" style="font-size: 1.1rem; margin-bottom: 40px;">Current Phase: Planning</p>

            <div class="progress-container" style="max-width: 600px; margin-bottom: 60px;">
                <div class="progress-bar-bg">
                    <div id="projectProgressBar" class="progress-bar-fill" style="width: 0%"></div>
                </div>
                <div class="progress-stats">
                    <span id="progressText" class="stat-value">0% Complete</span>
                    <span class="stat-label">Overall Progress</span>
                </div>
            </div>
        </header>

        <section class="animate-fade-in delay-1">
            <div class="section-header">
                <h2>Project Team</h2>
            </div>
            <div id="teamGrid" class="team-grid">
                <!-- Team members will be loaded here -->
            </div>
        </section>

        <section class="animate-fade-in delay-2" style="margin-top: 80px;">
            <div class="section-header">
                <h2>Roadmap & Milestones</h2>
            </div>
            <div id="milestoneList" class="milestone-list">
                <!-- Milestones will be loaded here -->
            </div>
        </section>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');

        async function loadProjectData() {
            if (!projectId) return;

            try {
                const response = await fetch(`../api/projects/details.php?id=${projectId}`);
                const data = await response.json();

                if (!data.success) {
                    alert(data.message);
                    return;
                }

                const p = data.project;
                document.getElementById('projectTitle').textContent = p.title;
                document.getElementById('projectStatus').textContent = `Current Phase: ${p.status}`;

                // Load Team
                const teamGrid = document.getElementById('teamGrid');
                let teamHtml = `
                    <div class="team-member" style="border: 1px solid var(--accent-success);">
                        <div style="font-weight: 600;">${p.creator_email.split('@')[0]}</div>
                        <div class="member-role">Creator</div>
                    </div>
                `;

                if (data.investor) {
                    teamHtml += `
                        <div class="team-member" style="border: 1px solid var(--accent-blue);">
                            <div style="font-weight: 600;">${data.investor.email.split('@')[0]}</div>
                            <div class="member-role">Investor</div>
                        </div>
                    `;
                }

                data.collaborators.forEach(c => {
                    teamHtml += `
                        <div class="team-member">
                            <div style="font-weight: 600;">${c.email.split('@')[0]}</div>
                            <div class="member-role">${c.role}</div>
                        </div>
                    `;
                });
                teamGrid.innerHTML = teamHtml;

                // Load Milestones
                const milestoneList = document.getElementById('milestoneList');
                let completedCount = 0;
                milestoneList.innerHTML = data.milestones.map(m => {
                    if (m.status === 'Completed') completedCount++;
                    const statusClass = `status-${m.status.toLowerCase().replace(' ', '-')}`;
                    const icon = m.status === 'Completed' ? '✓' : (m.status === 'In Progress' ? '⋯' : '○');
                    
                    return `
                        <div class="milestone-item">
                            <div class="milestone-status-icon ${statusClass}">${icon}</div>
                            <div>
                                <h3 style="font-size: 1.1rem; margin-bottom: 4px;">${m.title}</h3>
                                <p class="text-muted" style="font-size: 0.9rem;">${m.description}</p>
                            </div>
                            <div style="text-align: right;">
                                <div style="font-size: 0.8rem; font-weight: 600;">${m.status}</div>
                                <div class="text-muted" style="font-size: 0.75rem;">Due: ${new Date(m.due_date).toLocaleDateString()}</div>
                            </div>
                        </div>
                    `;
                }).join('');

                // Update Progress Bar
                if (data.milestones.length > 0) {
                    const percent = Math.round((completedCount / data.milestones.length) * 100);
                    document.getElementById('projectProgressBar').style.width = `${percent}%`;
                    document.getElementById('progressText').textContent = `${percent}% Complete`;
                }

            } catch (error) {
                console.error(error);
            }
        }

        async function initNavbar() {
            try {
                const response = await fetch('../api/check_auth.php');
                const data = await response.json();
                if (data.authenticated) {
                    // Already handled by static HTML + CSS for now
                } else {
                    window.location.href = '../login.html';
                }
            } catch (e) {}
        }

        loadProjectData();
        initNavbar();
    </script>
</body>
</html>
