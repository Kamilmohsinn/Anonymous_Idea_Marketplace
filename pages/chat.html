<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Chat - Anonymous Idea Marketplace</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body style="display:none;">
    <nav class="navbar">
        <div class="container nav-content">
            <div class="logo"><a href="../index.html" style="color: var(--text-main);">Vision to Reality</a></div>
            <div class="nav-links"><a href="dashboard.html">Dashboard</a></div>
        </div>
    </nav>

    <main class="container" style="padding-top:40px; padding-bottom:60px;">
        <div class="section-header"><h2>Private Collaboration Chat</h2></div>
        <div id="chatInterface" class="chat-container-inner animate-fade-in">
            <div id="chatHeader" class="chat-header">
                <div class="creator-avatar"></div>
                <div>
                    <h3 id="chatPartnerName">Collaborator</h3>
                    <span id="chatStatus" class="text-muted" style="font-size: 0.75rem;">Active Collaboration</span>
                </div>
            </div>
            <div id="messages" class="messages-list"></div>
            <form id="sendForm" class="chat-input-area">
                <label for="fileInput" class="file-label">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                    <input id="fileInput" type="file" style="display:none;">
                </label>
                <input id="messageInput" class="form-control chat-input" placeholder="Message...">
                <button class="btn btn-primary send-btn" type="submit">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
        </div>
    </main>

    <script>
        let roomId = null;
        let lastMessageId = 0;
        let currentUserId = 0;

        async function checkAuth() {
            const response = await fetch('../api/check_auth.php');
            const data = await response.json();
            if (!data.authenticated) {
                window.location.href = '../login.html';
                return false;
            }
            document.body.style.display = 'block';
            return true;
        }

        function getRequestId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('request_id');
        }

        function appendMessages(messages) {
            const container = document.getElementById('messages');
            messages.forEach((m) => {
                lastMessageId = Math.max(lastMessageId, Number(m.id));
                const mine = Number(m.sender_user_id) === Number(currentUserId);
                const time = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                const msgDiv = document.createElement('div');
                msgDiv.className = `message-wrapper ${mine ? 'message-mine' : 'message-other'}`;
                
                const filePart = m.attachment_path ? `
                    <div class="message-attachment">
                        <a href="../${m.attachment_path}" target="_blank">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path><polyline points="13 2 13 9 20 9"></polyline></svg>
                            View File
                        </a>
                    </div>` : '';

                msgDiv.innerHTML = `
                    <div class="message-bubble">
                        <div class="message-text">${m.message}</div>
                        ${filePart}
                        <div class="message-time">${time}</div>
                    </div>
                `;
                container.appendChild(msgDiv);
            });
            container.scrollTop = container.scrollHeight;
        }

        async function openRoom() {
            const requestId = getRequestId();
            if (!requestId) {
                alert('Missing request_id');
                window.location.href = 'dashboard.html';
                return;
            }

            const response = await fetch(`../api/chat/open.php?request_id=${encodeURIComponent(requestId)}`);
            const data = await response.json();
            if (!data.success) {
                alert(data.message || 'Unable to open chat');
                window.location.href = 'dashboard.html';
                return;
            }

            roomId = data.room.id;
            currentUserId = data.current_user_id;
            document.getElementById('chatPartnerName').textContent = data.partner_email || 'Partner';
            document.getElementById('messages').innerHTML = '';
            appendMessages(data.messages || []);
        }

        async function pollMessages() {
            if (!roomId) return;
            const response = await fetch(`../api/chat/list.php?room_id=${roomId}&after_id=${lastMessageId}`);
            const data = await response.json();
            if (data.success && Array.isArray(data.messages) && data.messages.length > 0) {
                appendMessages(data.messages);
            }
        }

        async function sendMessage(e) {
            e.preventDefault();
            const input = document.getElementById('messageInput');
            const fileInput = document.getElementById('fileInput');
            const text = input.value.trim();
            const file = fileInput.files[0];
            if ((!text && !file) || !roomId) return;

            const formData = new FormData();
            formData.append('room_id', roomId);
            formData.append('message', text);
            if (file) {
                formData.append('attachment', file);
            }
            const response = await fetch('../api/chat/send.php', { method: 'POST', body: formData });
            const data = await response.json();
            if (data.success) {
                input.value = '';
                fileInput.value = '';
                pollMessages();
            }
        }

        document.getElementById('sendForm').addEventListener('submit', sendMessage);

        (async function init() {
            const ok = await checkAuth();
            if (ok) {
                await openRoom();
                setInterval(pollMessages, 2000);
            }
        })();
    </script>
</body>
</html>
