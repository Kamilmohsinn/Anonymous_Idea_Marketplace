<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Details - Vision to Reality</title>
    <link rel="stylesheet" href="../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-visuals">
        <div class="wave"></div>
    </div>

    <nav class="navbar">
        <div class="container nav-content">
            <div class="logo">
                <a href="../index.html" style="color: inherit; display: flex; align-items: center; gap: 8px;">
                    <span style="font-weight: 300;">Vision to Reality</span>
                </a>
            </div>
            <div id="navLinks" class="nav-links">
                <a href="../index.html">Discover</a>
                <a href="search.html">Search</a>
                <a href="crowdfunding.html">Crowdfunding</a>
                <a href="../login.html" class="btn btn-primary" style="padding: 6px 16px;">Sign In</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <div id="campaignDetails" class="campaign-details-layout animate-fade-in">
            <div class="campaign-main">
                <div id="campaignHero" class="campaign-image" style="height: 400px; border-radius: 24px; margin-bottom: 40px;"></div>
                
                <h1 id="campaignTitle" style="font-size: 3rem; margin-bottom: 24px;">Loading...</h1>
                <div style="display: flex; gap: 20px; margin-bottom: 40px; color: var(--text-muted);">
                    <span id="campaignCreator">By Anonymous</span>
                    <span id="campaignDate">Ends on --</span>
                </div>

                <div class="section-header">
                    <h2>The Vision</h2>
                </div>
                <p id="campaignDescription" style="font-size: 1.2rem; line-height: 1.6; color: var(--text-muted); margin-bottom: 60px;">
                    Loading campaign details...
                </p>

                <div class="section-header">
                    <h2>Reward Tiers</h2>
                </div>
                <div id="rewardsGrid" class="reward-grid">
                    <!-- Reward cards will be loaded here -->
                </div>
            </div>

            <aside class="campaign-sidebar">
                <div class="donation-card">
                    <div class="progress-container" style="margin-bottom: 32px;">
                        <div class="progress-bar-bg">
                            <div id="progressBar" class="progress-bar-fill" style="width: 0%"></div>
                        </div>
                        <div class="progress-stats">
                            <div>
                                <span id="raisedAmount" class="stat-value">$0</span>
                                <span class="stat-label">Raised</span>
                            </div>
                            <div style="text-align: right;">
                                <span id="percentRaised" class="stat-value">0%</span>
                                <span id="goalAmountLabel" class="stat-label">of $0</span>
                            </div>
                        </div>
                    </div>

                    <form id="donationForm">
                        <div class="form-group">
                            <label class="form-label">Custom Contribution Amount ($)</label>
                            <input type="number" id="donationAmount" class="form-control" placeholder="10" min="1" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Encouragement Message (Optional)</label>
                            <textarea id="donationMessage" class="form-control" placeholder="Good luck with the project!" style="min-height: 80px;"></textarea>
                        </div>
                        <button type="submit" id="donateBtn" class="btn btn-primary" style="width: 100%; padding: 16px;">Support This Vision</button>
                    </form>
                    <p id="loginPrompt" style="display: none; color: #ff3b30; font-size: 0.85rem; text-align: center; margin-top: 12px;">
                        Please <a href="../login.html" style="color: inherit; text-decoration: underline;">Sign In</a> to support this project.
                    </p>
                </div>
            </aside>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const campaignId = urlParams.get('id');
        let selectedRewardId = null;
        let isAuthenticated = false;

        async function loadDetails() {
            try {
                const response = await fetch(`../api/crowdfunding/details.php?id=${campaignId}`);
                const data = await response.json();

                if (!data.success) {
                    alert('Error: ' + data.message);
                    return;
                }

                const c = data.campaign;
                document.getElementById('campaignTitle').textContent = c.title;
                document.getElementById('campaignDescription').textContent = c.description;
                document.getElementById('campaignCreator').textContent = `Proposed by ${c.pseudonym || 'Anonymous'}`;
                document.getElementById('campaignDate').textContent = `Ends on ${new Date(c.end_date).toLocaleDateString()}`;

                if (c.image_path) {
                    const hero = document.getElementById('campaignHero');
                    hero.style.backgroundImage = `url('../${c.image_path}')`;
                    hero.style.backgroundSize = 'cover';
                    hero.style.backgroundPosition = 'center';
                }

                const raised = parseFloat(c.current_amount);
                const goal = parseFloat(c.goal_amount);
                const progress = Math.min(100, (raised / goal) * 100);

                document.getElementById('progressBar').style.width = `${progress}%`;
                document.getElementById('raisedAmount').textContent = `$${raised.toLocaleString()}`;
                document.getElementById('percentRaised').textContent = `${Math.round(progress)}%`;
                document.getElementById('goalAmountLabel').textContent = `of $${goal.toLocaleString()}`;

                if (c.status !== 'Active') {
                    document.getElementById('donateBtn').disabled = true;
                    document.getElementById('donateBtn').textContent = c.status;
                }

                // Load Rewards
                const rewardsGrid = document.getElementById('rewardsGrid');
                if (data.rewards.length === 0) {
                    rewardsGrid.innerHTML = '<p class="text-muted">No reward tiers for this campaign.</p>';
                } else {
                    rewardsGrid.innerHTML = data.rewards.map(r => `
                        <div class="reward-card" data-id="${r.id}" data-amount="${r.min_amount}">
                            <div class="reward-amount">$${parseFloat(r.min_amount).toLocaleString()}</div>
                            <div class="reward-title">${r.title}</div>
                            <div class="reward-description">${r.description}</div>
                        </div>
                    `).join('');

                    document.querySelectorAll('.reward-card').forEach(card => {
                        card.onclick = () => {
                            document.querySelectorAll('.reward-card').forEach(c => c.classList.remove('selected'));
                            card.classList.add('selected');
                            selectedRewardId = card.dataset.id;
                            document.getElementById('donationAmount').value = card.dataset.amount;
                        };
                    });
                }

            } catch (error) {
                console.error(error);
            }
        }

        document.getElementById('donationForm').onsubmit = async (e) => {
            e.preventDefault();
            
            if (!isAuthenticated) {
                document.getElementById('loginPrompt').style.display = 'block';
                alert('Please sign in to contribute to this campaign.');
                return;
            }

            const payload = {
                campaign_id: campaignId,
                amount: document.getElementById('donationAmount').value,
                message: document.getElementById('donationMessage').value,
                reward_id: selectedRewardId
            };

            try {
                const response = await fetch('../api/crowdfunding/donate.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (response.status === 401) {
                    alert('Your session has expired. Please sign in again.');
                    window.location.href = '../login.html';
                    return;
                }

                const data = await response.json();
                if (data.success) {
                    alert('Thank you for your support! Your contribution has been recorded.');
                    loadDetails(); // Reload to show progress
                    document.getElementById('donationForm').reset();
                    selectedRewardId = null;
                    document.querySelectorAll('.reward-card').forEach(c => c.classList.remove('selected'));
                } else {
                    alert('Donation failed: ' + data.message);
                }
            } catch (error) {
                alert('An error occurred during donation.');
            }
        };

        async function initNavbar() {
            try {
                const response = await fetch('../api/check_auth.php');
                const data = await response.json();
                const navLinks = document.getElementById('navLinks');

                if (data.authenticated) {
                    isAuthenticated = true;
                    navLinks.innerHTML = `
                        <a href="../index.html">Discover</a>
                        <a href="search.html">Search</a>
                        <a href="crowdfunding.html">Crowdfunding</a>
                        <a href="dashboard.html" class="btn btn-primary" style="padding: 6px 16px;">Dashboard</a>
                    `;
                }
            } catch (e) {
                isAuthenticated = false;
            }
        }

        if (campaignId) {
            loadDetails();
            initNavbar();
        } else {
            window.location.href = 'crowdfunding.html';
        }
    </script>
</body>
</html>
